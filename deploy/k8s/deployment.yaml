apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-api
  namespace: memsentinel
  labels:
    app.kubernetes.io/name: target-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: target-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: target-api
    spec:
      serviceAccountName: memsentinel

      # Required: allows the sidecar to see the API's PID via /proc
      shareProcessNamespace: true

      volumes:
        # Shared socket directory — the .NET runtime creates
        # dotnet-diagnostic-*.sock here; the sidecar connects to it
        - name: tmp-shared
          emptyDir: {}

      containers:
        # ----------------------------------------------------------------
        # TARGET API — replace this stub with your actual workload
        # ----------------------------------------------------------------
        - name: target-api
          image: your-registry/your-api:latest   # <-- replace
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: tmp-shared
              mountPath: /tmp

        # ----------------------------------------------------------------
        # MEMSENTINEL SIDECAR
        # ----------------------------------------------------------------
        - name: memsentinel
          image: ghcr.io/your-org/memsentinel:latest   # <-- replace
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["SYS_PTRACE"]   # Required for /proc access and diagnostic port attach

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "100Mi"
              cpu: "150m"

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ASPNETCORE_URLS
              value: "http://+:5000"

          volumeMounts:
            - name: tmp-shared
              mountPath: /tmp

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: memsentinel
  namespace: memsentinel
  labels:
    app.kubernetes.io/name: memsentinel
    app.kubernetes.io/component: agent
spec:
  selector:
    app.kubernetes.io/name: target-api
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
